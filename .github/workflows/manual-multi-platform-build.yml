name: Manual Multi-Platform Build

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump level
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.read-version.outputs.version }}
      tag: ${{ steps.read-version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump and sync version files
        run: node scripts/versioning.mjs bump "${{ github.event.inputs.bump }}"

      - name: Verify synchronized version files
        run: node scripts/versioning.mjs check

      - name: Read version metadata
        id: read-version
        shell: bash
        run: |
          VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version")
          TAG="app-v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit version update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to v${{ steps.read-version.outputs.version }}"

      - name: Push version commit and tag
        shell: bash
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git tag "${{ steps.read-version.outputs.tag }}"
          git push origin "${{ steps.read-version.outputs.tag }}"

  build:
    needs: prepare-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
          - os: macos-14
            platform: macos-arm64
          - os: windows-2022
            platform: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout version tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-version.outputs.tag }}
          releaseName: Workgrid Studio v${{ needs.prepare-version.outputs.version }}
          releaseBody: Automated multi-platform build generated by GitHub Actions.
          releaseDraft: true
          prerelease: true
          args: --verbose
