<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="WorkGrid Studio" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkGrid Studio</title>
  </head>

  <body>
    <div id="root">
      <div
        style="
          position: fixed;
          inset: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          flex-direction: column;
          background: #0f0f10;
          font-family:
            -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
            sans-serif;
          overflow: hidden;
        "
      >
        <!-- Top nav bar skeleton -->
        <div
          style="
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid #222224;
            box-sizing: border-box;
          "
        >
          <div
            style="
              width: 120px;
              height: 28px;
              border-radius: 6px;
              background: linear-gradient(
                90deg,
                #1c1c1e 25%,
                #2a2a2d 37%,
                #1c1c1e 63%
              );
              background-size: 400% 100%;
              animation: shimmer 1.4s ease infinite;
            "
          ></div>
          <div style="display: flex; gap: 12px">
            <div
              style="
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: linear-gradient(
                  90deg,
                  #1c1c1e 25%,
                  #2a2a2d 37%,
                  #1c1c1e 63%
                );
                background-size: 400% 100%;
                animation: shimmer 1.4s ease infinite;
              "
            ></div>
          </div>
        </div>

        <!-- Body content skeleton -->
        <div style="flex: 1; display: flex; overflow: hidden">
          <!-- Sidebar skeleton -->
          <div
            style="
              width: 240px;
              flex-shrink: 0;
              padding: 20px 16px;
              border-right: 1px solid #222224;
              box-sizing: border-box;
              display: flex;
              flex-direction: column;
              gap: 12px;
            "
          >
            <div
              style="
                width: 80%;
                height: 16px;
                border-radius: 4px;
                background: linear-gradient(
                  90deg,
                  #1c1c1e 25%,
                  #2a2a2d 37%,
                  #1c1c1e 63%
                );
                background-size: 400% 100%;
                animation: shimmer 1.4s ease infinite;
              "
            ></div>
            <div
              style="
                width: 60%;
                height: 16px;
                border-radius: 4px;
                background: linear-gradient(
                  90deg,
                  #1c1c1e 25%,
                  #2a2a2d 37%,
                  #1c1c1e 63%
                );
                background-size: 400% 100%;
                animation: shimmer 1.4s ease infinite;
                animation-delay: 0.1s;
              "
            ></div>
            <div
              style="
                width: 70%;
                height: 16px;
                border-radius: 4px;
                background: linear-gradient(
                  90deg,
                  #1c1c1e 25%,
                  #2a2a2d 37%,
                  #1c1c1e 63%
                );
                background-size: 400% 100%;
                animation: shimmer 1.4s ease infinite;
                animation-delay: 0.2s;
              "
            ></div>
            <div
              style="
                width: 50%;
                height: 16px;
                border-radius: 4px;
                background: linear-gradient(
                  90deg,
                  #1c1c1e 25%,
                  #2a2a2d 37%,
                  #1c1c1e 63%
                );
                background-size: 400% 100%;
                animation: shimmer 1.4s ease infinite;
                animation-delay: 0.3s;
              "
            ></div>
          </div>

          <!-- Main content skeleton -->
          <div
            style="
              flex: 1;
              padding: 32px;
              box-sizing: border-box;
              display: flex;
              flex-direction: column;
              gap: 20px;
              overflow: hidden;
            "
          >
            <div
              style="
                width: 40%;
                height: 28px;
                border-radius: 6px;
                background: linear-gradient(
                  90deg,
                  #1c1c1e 25%,
                  #2a2a2d 37%,
                  #1c1c1e 63%
                );
                background-size: 400% 100%;
                animation: shimmer 1.4s ease infinite;
              "
            ></div>

            <div
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 16px;
              "
            >
              <div
                style="
                  height: 110px;
                  border-radius: 12px;
                  background: linear-gradient(
                    90deg,
                    #1c1c1e 25%,
                    #2a2a2d 37%,
                    #1c1c1e 63%
                  );
                  background-size: 400% 100%;
                  animation: shimmer 1.4s ease infinite;
                "
              ></div>
              <div
                style="
                  height: 110px;
                  border-radius: 12px;
                  background: linear-gradient(
                    90deg,
                    #1c1c1e 25%,
                    #2a2a2d 37%,
                    #1c1c1e 63%
                  );
                  background-size: 400% 100%;
                  animation: shimmer 1.4s ease infinite;
                  animation-delay: 0.1s;
                "
              ></div>
              <div
                style="
                  height: 110px;
                  border-radius: 12px;
                  background: linear-gradient(
                    90deg,
                    #1c1c1e 25%,
                    #2a2a2d 37%,
                    #1c1c1e 63%
                  );
                  background-size: 400% 100%;
                  animation: shimmer 1.4s ease infinite;
                  animation-delay: 0.2s;
                "
              ></div>
            </div>

            <div
              style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-top: 8px;
              "
            >
              <div
                style="
                  width: 100%;
                  height: 14px;
                  border-radius: 4px;
                  background: linear-gradient(
                    90deg,
                    #1c1c1e 25%,
                    #2a2a2d 37%,
                    #1c1c1e 63%
                  );
                  background-size: 400% 100%;
                  animation: shimmer 1.4s ease infinite;
                "
              ></div>
              <div
                style="
                  width: 95%;
                  height: 14px;
                  border-radius: 4px;
                  background: linear-gradient(
                    90deg,
                    #1c1c1e 25%,
                    #2a2a2d 37%,
                    #1c1c1e 63%
                  );
                  background-size: 400% 100%;
                  animation: shimmer 1.4s ease infinite;
                  animation-delay: 0.1s;
                "
              ></div>
              <div
                style="
                  width: 88%;
                  height: 14px;
                  border-radius: 4px;
                  background: linear-gradient(
                    90deg,
                    #1c1c1e 25%,
                    #2a2a2d 37%,
                    #1c1c1e 63%
                  );
                  background-size: 400% 100%;
                  animation: shimmer 1.4s ease infinite;
                  animation-delay: 0.2s;
                "
              ></div>
              <div
                style="
                  width: 70%;
                  height: 14px;
                  border-radius: 4px;
                  background: linear-gradient(
                    90deg,
                    #1c1c1e 25%,
                    #2a2a2d 37%,
                    #1c1c1e 63%
                  );
                  background-size: 400% 100%;
                  animation: shimmer 1.4s ease infinite;
                  animation-delay: 0.3s;
                "
              ></div>
            </div>
          </div>
        </div>

        <!-- Centered spinner overlay -->
        <div
          style="
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8a8a8e;
            font-size: 13px;
          "
        >
          <div
            style="
              width: 16px;
              height: 16px;
              border: 2px solid #333336;
              border-top-color: #8a8a8e;
              border-radius: 50%;
              animation: spin 0.7s linear infinite;
            "
          ></div>
          <span>Loading…</span>
        </div>
      </div>

      <style>
        @keyframes shimmer {
          0% {
            background-position: 100% 50%;
          }
          100% {
            background-position: 0% 50%;
          }
        }
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
